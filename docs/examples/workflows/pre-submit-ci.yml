# Example GitHub Actions workflow: pre-submit CI trigger.
# Runs the full build/test suite on branches BEFORE they are merged to main.
#
# This prevents broken code from reaching main. Instead of catching failures
# after a merge, this workflow runs on every push to non-main branches and
# on pull requests targeting main. The merge only proceeds if CI is green.
#
# Copy this file to .github/workflows/pre-submit-ci.yml in your repo.

name: Pre-Submit CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate template structure
        run: ./validate.sh

      - name: Run build checks
        run: |
          if [ -f scripts/check.sh ]; then
            bash scripts/check.sh
          else
            echo "No scripts/check.sh found — add build commands to run here"
          fi

      - name: Lint workflow files
        run: |
          if [ -f scripts/lint-workflows.sh ]; then
            bash scripts/lint-workflows.sh
          fi

  # Gate: this status check can be required in GitHub branch protection
  # Settings → Branches → Branch protection rules → Require status checks
  ci-gate:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: Check CI result
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "CI failed — merge is blocked"
            exit 1
          fi
          echo "CI passed — merge is allowed"
